services:
  api:
    build: ./backend
    ports:
      - "${NURTRANS_API_PORT:-18000}:8000"

  frontend:
    build: ./frontend
    ports:
      - "${NURTRANS_FRONTEND_PORT:-15173}:5173"
    depends_on:
      - api

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: nurtrans
      POSTGRES_PASSWORD: nurtrans
      POSTGRES_DB: nurtrans
    ports:
      - "${NURTRANS_POSTGRES_PORT:-15432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "${NURTRANS_REDIS_PORT:-16379}:6379"

volumes:
  pgdata:
